name: lung_diagnosis_app
description: A Flutter app for lung disease diagnosis.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #  flutter_sound: ^9.2.13

  shared_preferences: ^2.2.3
  # Navigation
  curved_navigation_bar: ^1.0.3

  # State management
  provider: ^6.1.1

  flutter_native_splash: ^2.4.6

  # Storage
  path_provider: ^2.1.4

  # ✅ Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.3

  dio: ^5.0.0
  flutter_secure_storage: ^9.0.0


  # Fonts
  google_fonts: ^6.1.0

  # Date formatting
  intl: ^0.18.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5

  # Audio
  audioplayers: ^5.2.1
  record: ^6.1.2
  audio_waveforms: ^1.0.5

  # Image & file picking
  image_picker: 1.2.1
  file_picker: ^10.3.8

  # Permissions
  permission_handler: ^11.3.1

  # UI
  flutter_svg: ^2.1.1
  dotted_border: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/fonts/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
